{% extends "base.html" %}

{% block content %}

<h2>Attendance Marked Successfully</h2>

<hr>

<div style="background-color: #c8e6c9; padding: 20px; border-radius: 5px; margin: 20px 0; text-align: center;">
    <h3 style="color: #2e7d32; margin-top: 0;">✓ Success!</h3>
    <p style="font-size: 18px; margin: 10px 0;">
        Attendance for <strong>{{ course[1] }}</strong> has been updated.
    </p>
    <p style="margin: 10px 0; font-size: 14px;">
        <strong>Total Lectures:</strong> {{ total_lectures }} | <strong>Students Updated:</strong> {{ success_count }}
    </p>
</div>

<hr>

<div style="text-align: center; margin: 30px 0;">
    <a href="/faculty/course/{{ sem_course_id }}"><button style="padding: 12px 40px; background-color: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px; font-weight: bold;">
        📋 View Students
    </button></a>
    
    <a href="/faculty/dashboard"><button style="padding: 12px 40px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;">
        📚 Back to Dashboard
    </button></a>
</div>

{% endblock %}
